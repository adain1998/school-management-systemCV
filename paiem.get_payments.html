{% extends 'base.html' %}

{% block title %}Nouveau Paiement{% endblock %}

{% block content %}
<h1>Nouveau Paiement</h1>
<form method="POST" action="{{ url_for('paiem.create_payment') }}">
    <div class="form-group">
        <label for="montant">Montant:</label>
        <input type="text" name="montant" id="montant" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="date">Date:</label>
        <input type="date" name="date" id="date" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="student_id">ID Étudiant:</label>
        <input type="text" name="student_id" id="student_id" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="frais_id">ID Frais:</label>
        <input type="text" name="frais_id" id="frais_id" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="mois">Mois:</label>
        <input type="text" name="mois" id="mois" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="annee">Année:</label>
        <input type="text" name="annee" id="annee" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="statut">Statut:</label>
        <input type="text" name="statut" id="statut" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Créer</button>
</form>
{% endblock %}
