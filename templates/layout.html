<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Lien vers une feuille de style externe pour des styles professionnels -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <!-- Icône de l'application (optionnelle) -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">

    <title>Gestion des Étudiants</title>
</head>
<body>

    <!-- Barre de navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for(blueprint_stud + '.all_students') }}">Gestion des Étudiants</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for(blueprint_stud + '.all_students') }}">Tous les étudiants</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for(blueprint_stud + '.rechercher_eleves') }}">Rechercher</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for(blueprint_stud + '.add_student') }}">Ajouter un étudiant</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenu principal de la page -->
    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2025 Gestion des Étudiants. Tous droits réservés.</p>
    </footer>

    <!-- Inclusion de scripts externes -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/student_list.js') }}"></script>
</body>
</html>
