{% extends 'base_performance.html' %}
{% block title %}Tableau de bord{% endblock %}

{% block content %}
<h1 class="mt-5">Tableau de bord analytique</h1>
<div class="row">
    <div class="col-md-6">
        <canvas id="avgGradeChart"></canvas>
    </div>
    <div class="col-md-6">
        <canvas id="attendanceChart"></canvas>
    </div>
</div>
<div class="row mt-5">
    <div class="col-md-6">
        <canvas id="assignmentsChart"></canvas>
    </div>
    <div class="col-md-6">
        <canvas id="absencesChart"></canvas>
    </div>
</div>

<script>
    var ctx1 = document.getElementById('avgGradeChart').getContext('2d');
    var avgGradeChart = new Chart(ctx1, {
        type: 'bar',
        data: {
            labels: {{ students|map(attribute='name')|tojson }},
            datasets: [{
                label: 'Moyenne des notes',
                data: {{ students|map(attribute='avg_grade')|tojson }},
                backgroundColor: 'rgba(75, 192, 192, 0.2)',
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    var ctx2 = document.getElementById('attendanceChart').getContext('2d');
    var attendanceChart = new Chart(ctx2, {
        type: 'pie',
        data: {
            labels: {{ students|map(attribute='name')|tojson }},
            datasets: [{
                label: 'Taux de présence',
                data: {{ students|map(attribute='attendance_rate')|tojson }},
                backgroundColor: ['rgba(255, 99, 132, 0.2)', 'rgba(54, 162, 235, 0.2)', 'rgba(255, 206, 86, 0.2)'],
                borderColor: ['rgba(255, 99, 132, 1)', 'rgba(54, 162, 235, 1)', 'rgba(255, 206, 86, 1)'],
                borderWidth: 1
            }]
        }
    });

    var ctx3 = document.getElementById('assignmentsChart').getContext('2d');
    var assignmentsChart = new Chart(ctx3, {
        type: 'line',
        data: {
            labels: {{ students|map(attribute='name')|tojson }},
            datasets: [{
                label: 'Devoirs complétés',
                data: {{ students|map(attribute='completed_assignments')|tojson }},
                backgroundColor: 'rgba(153, 102, 255, 0.2)',
                borderColor: 'rgba(153, 102, 255, 1)',
                borderWidth: 1
            },
            {
                label: 'Total des devoirs',
                data: {{ students|map(attribute='total_assignments')|tojson }},
                backgroundColor: 'rgba(255, 159, 64, 0.2)',
                borderColor: 'rgba(255, 159, 64, 1)',
                borderWidth: 1
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    var ctx4 = document.getElementById('absencesChart').getContext('2d');
    var absencesChart = new Chart(ctx4, {
        type: 'doughnut',
        data: {
            labels: {{ students|map(attribute='name')|tojson }},
            datasets: [{
                label: 'Absences',
                data: {{ students|map(attribute='absences')|tojson }},
                backgroundColor: ['rgba(255, 99, 132, 0.2)', 'rgba(54, 162, 235, 0.2)', 'rgba(75, 192, 192, 0.2)'],
                borderColor: ['rgba(255, 99, 132, 1)', 'rgba(54, 162, 235, 1)', 'rgba(75, 192, 192, 1)'],
                borderWidth: 1
            }]
        }
    });
</script>
{% endblock %}
