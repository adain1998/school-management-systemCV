<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Title{% endblock %}</title>

    <!-- Bootstrap 5 CSS for modern UI components -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SweetAlert2 CSS for beautiful alerts -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.4.25/dist/sweetalert2.min.css" rel="stylesheet">

    <!-- Custom styles for a clean UI -->
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .form-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 50px auto;
        }
        .form-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #007bff;
        }
    </style>

    <!-- Bootstrap 5 JS and Popper.js for components -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SweetAlert2 for modern alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.4.25/dist/sweetalert2.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            form.addEventListener('submit', (event) => {
                const title = document.querySelector('#title').value;
                const content = document.querySelector('#content').value;

                // Check if any fields are empty
                if (!title || !content) {
                    event.preventDefault();
                    showErrorAlert('All fields must be filled out!');
                }
            });
        });

        // Custom function to show SweetAlert error messages
        function showErrorAlert(message) {
            Swal.fire({
                icon: 'error',
                title: 'Oops...',
                text: message,
                confirmButtonText: 'Got it!',
            });
        }
    </script>
</head>
<body>

    <div class="container">
        <div class="form-container">
            <h1 class="form-title">Create New Post</h1>
            <form>
                <div class="mb-3">
                    <label for="title" class="form-label">Title</label>
                    <input type="text" id="title" class="form-control" placeholder="Enter post title" required>
                </div>
                <div class="mb-3">
                    <label for="content" class="form-label">Content</label>
                    <textarea id="content" class="form-control" rows="4" placeholder="Enter post content" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Post</button>
            </form>
        </div>
    </div>

    {% block content %}{% endblock %}
    {{ script }}
</body>
</html>
