{% extends 'base.html' %}

{% block title %}Paiements Échelonnés{% endblock %}

{% block content %}
<h1>Paiements Échelonnés</h1>

<form method="POST" action="{{ url_for('app.payment_installments', payment_id=payment.id) }}">
    <div class="form-group">
        <label for="montant">Montant:</label>
        <input type="text" name="montant" id="montant" class="form-control" value="{{ payment.montant }}">
    </div>
    <div class="form-group">
        <label for="echeance">Échéance:</label>
        <input type="date" name="echeance" id="echeance" class="form-control" value="{{ payment.echeance }}">
    </div>
    <div class="form-group">
        <label for="nombre_echeances">Nombre d'Échéances:</label>
        <input type="number" name="nombre_echeances" id="nombre_echeances" class="form-control" value="1">
    </div>
    <button type="submit" class="btn btn-primary">Mettre à Jour</button>
</form>

<a href="{{ url_for('app.manage_payments') }}" class="btn btn-secondary mt-4">Retour</a>

{% endblock %}
