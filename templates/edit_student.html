{% extends "base.html" %}

{% block content %}
<h1 class="mt-5">Modifier l'Étudiant</h1>
<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/edit_student.css') }}">

{% if flash_message %}
    <div class="alert alert-success" role="alert">
        {{ flash_message }}
    </div>
{% endif %}

<form action="{{ url_for('edit_student', id=student.id) }}" method="post">
    <!-- Nom -->
    <div class="form-group d-flex align-items-center">
        <label for="last_name" class="mr-2">Nom:</label>
        <input type="text" class="form-control" id="last_name" name="last_name" value="{{ student.last_name }}" required readonly>
        <button type="button" class="edit-btn" onclick="enableEdit('last_name')">
            <i class="fas fa-edit"></i>
        </button>
    </div>

    <!-- Prénom -->
    <div class="form-group d-flex align-items-center">
        <label for="first_name" class="mr-2">Prénom:</label>
        <input type="text" class="form-control" id="first_name" name="first_name" value="{{ student.first_name }}" required readonly>
        <button type="button" class="edit-btn" onclick="enableEdit('first_name')">
            <i class="fas fa-edit"></i>
        </button>
    </div>

    <!-- Classe -->
    <div class="form-group d-flex align-items-center">
        <label for="class_name" class="mr-2">Classe:</label>
        <input type="text" class="form-control" id="class_name" name="class_name" value="{{ student.class_name }}" required readonly>
        <button type="button" class="edit-btn" onclick="enableEdit('class_name')">
            <i class="fas fa-edit"></i>
        </button>
    </div>

    <!-- Date de Naissance -->
    <div class="form-group d-flex align-items-center">
        <label for="date_naissance" class="mr-2">Date de Naissance:</label>
        <input type="date" class="form-control" id="date_naissance" name="date_naissance" value="{{ student.date_naissance }}" required readonly>
        <button type="button" class="edit-btn" onclick="enableEdit('date_naissance')">
            <i class="fas fa-edit"></i>
        </button>
    </div>

    <!-- Date d'Inscription -->
    <div class="form-group d-flex align-items-center">
        <label for="registration_date" class="mr-2">Date d'Inscription:</label>
        <input type="date" class="form-control" id="registration_date" name="registration_date" value="{{ student.registration_date }}" required readonly>
        <button type="button" class="edit-btn" onclick="enableEdit('registration_date')">
            <i class="fas fa-edit"></i>
        </button>
    </div>

    <!-- Numéro matricule -->
    <div class="form-group d-flex align-items-center">
        <label for="numero_matricule" class="mr-2">Numéro matricule:</label>
        <input type="number" class="form-control" id="numero_matricule" name="numero_matricule" value="{{ student.numero_matricule }}" required readonly>
        <button type="button" class="edit-btn" onclick="enableEdit('numero_matricule')">
            <i class="fas fa-edit"></i>
        </button>
    </div>

    <!-- Frais Payés -->
    <div class="form-group d-flex align-items-center">
        <label for="fees_paid" class="mr-2">Frais Payés:</label>
        <input type="number" step="0.01" class="form-control" id="fees_paid" name="fees_paid" value="{{ student.fees_paid }}" required readonly>
        <button type="button" class="edit-btn" onclick="enableEdit('fees_paid')">
            <i class="fas fa-edit"></i>
        </button>
    </div>

    <!-- ID de la Classe -->
    <div class="form-group d-flex align-items-center">
        <label for="class_id" class="mr-2">ID de la Classe:</label>
        <input type="number" class="form-control" id="class_id" name="class_id" value="{{ student.class_id }}" required readonly>
        <button type="button" class="edit-btn" onclick="enableEdit('class_id')">
            <i class="fas fa-edit"></i>
        </button>
    </div>

    <!-- Dette -->
    <div class="form-group d-flex align-items-center">
        <label for="debt" class="mr-2">Dette:</label>
        <input type="number" step="0.01" class="form-control" id="debt" name="debt" value="{{ student.debt }}" required readonly>
        <button type="button" class="edit-btn" onclick="enableEdit('debt')">
            <i class="fas fa-edit"></i>
        </button>
    </div>

    <!-- Religion -->
    <div class="form-group d-flex align-items-center">
        <label for="religion" class="mr-2">Religion:</label>
        <input type="text" class="form-control" id="religion" name="religion" value="{{ student.religion }}" readonly>
        <button type="button" class="edit-btn" onclick="enableEdit('religion')">
            <i class="fas fa-edit"></i>
        </button>
    </div>

    <!-- Assignations -->
    <div class="form-group">
        <label for="assignments">Assignations:</label>
        <select name="assignments" id="assignments" class="form-control" multiple>
            {% for assignment in assignments %}
                <option value="{{ assignment.id }}" {% if assignment.id in selected_assignment_ids %}selected{% endif %}>
                    {{ assignment.title }}
                </option>
            {% endfor %}
        </select>
        <small class="form-text text-muted">Sélectionnez les devoirs associés à cet étudiant.</small>
    </div>

    <button type="submit" class="btn btn-primary mt-3">Enregistrer</button>
</form>

<script src="{{ url_for('static', filename='js/edit_student.js') }}"></script>

<script>
    function enableEdit(fieldId) {
        var inputField = document.getElementById(fieldId);
        inputField.readOnly = false;
        inputField.focus();
    }
</script>

{% endblock %}
