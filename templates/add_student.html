{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center">Ajout d'un Étudiant</h2>

    <!-- Messages Flash -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('stud.add_student') }}" method="POST" class="form-container">
        <div class="row">
            <div class="col-md-6">
                <label for="last_name" class="form-label">Nom</label>
                <input type="text" class="form-control" id="last_name" name="last_name" required>
            </div>
            <div class="col-md-6">
                <label for="first_name" class="form-label">Prénom</label>
                <input type="text" class="form-control" id="first_name" name="first_name" required>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-6">
                <label for="class_name" class="form-label">Classe</label>
                <input type="text" class="form-control" id="class_name" name="class_name" required>
            </div>
            <div class="col-md-6">
                <label for="date_naissance" class="form-label">Date de Naissance</label>
                <input type="date" class="form-control" id="date_naissance" name="date_naissance" required>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-6">
                <label for="registration_date" class="form-label">Date d'Inscription</label>
                <input type="date" class="form-control" id="registration_date" name="registration_date" required>
            </div>
            <div class="col-md-6">
                <label for="numero_matricule" class="form-label">Numéro Matricule</label>
                <input type="text" class="form-control" id="numero_matricule" name="numero_matricule" required>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-6">
                <label for="fees_paid" class="form-label">Frais Payés</label>
                <input type="number" step="0.01" class="form-control" id="fees_paid" name="fees_paid" value="0">
            </div>
            <div class="col-md-6">
                <label for="debt" class="form-label">Dette</label>
                <input type="number" step="0.01" class="form-control" id="debt" name="debt" value="0">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-6">
                <label for="religion" class="form-label">Religion</label>
                <input type="text" class="form-control" id="religion" name="religion" value="N/A">
            </div>
            <div class="col-md-6">
                <label for="parent_id" class="form-label">ID du Parent</label>
                <input type="text" class="form-control" id="parent_id" name="parent_id" required>
            </div>
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-primary">Ajouter l'Étudiant</button>
        </div>
    </form>
</div>
<script src="{{ url_for('static', filename='js/student_list.js') }}"></script>
{% endblock %}
