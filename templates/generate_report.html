<!-- generate_report.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generate Report</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Generate Report</h1>
        <form method="POST" action="{{ url_for('generate_report') }}">
            {{ form.hidden_tag() }}
            <div class="mb-3">
                {{ form.report_type.label(class="form-label") }}
                {{ form.report_type(class="form-select") }}
            </div>
            <div class="mb-3">
                {{ form.start_date.label(class="form-label") }}
                {{ form.start_date(class="form-control") }}
            </div>
            <div class="mb-3">
                {{ form.submit(class="btn btn-primary") }}
            </div>
        </form>
    </div>
<!-- generate_report.html -->
<script>
    $(document).ready(function() {
        $('form').on('submit', function(event) {
            var reportType = $('#report_type').val();
            var startDate = $('#start_date').val();
            if (!reportType || !startDate) {
                alert('Please fill out all fields.');
                event.preventDefault();
            } else {
                return confirm('Are you sure you want to generate this report?');
            }
        });
    });
</script>
</body>
</html>
