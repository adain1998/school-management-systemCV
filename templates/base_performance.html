<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}Tableau de bord{% endblock %}</title>

    <!-- Lien vers les feuilles de style CSS (vous pouvez ajouter des styles communs ici) -->
   <link rel="stylesheet" href="static/css/dashboard_performance.css">
    <!-- Bootstrap 5 CSS pour une interface moderne -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Styles personnalisés pour une UI épurée -->
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            margin-top: 50px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        footer {
            margin-top: 30px;
            text-align: center;
        }
    </style>

    <!-- Scripts pour Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Scripts pour html2canvas et jsPDF (export PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/0.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
</head>

<body>
    <div class="container">
        <!-- Menu ou navigation globale -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <a class="navbar-brand" href="#">Tableau de bord</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Accueil</a>
                    </li>
                    <!-- Ajouter d'autres éléments de navigation si nécessaire -->
                </ul>
            </div>
        </nav>

        <!-- Titre principal de la page -->
        <h1 class="text-center mb-4">Performance Metrics</h1>

        <!-- Conteneur du graphique -->
        <div class="chart-container">
            <canvas id="performanceChart"></canvas>
        </div>

        <!-- Contenu spécifique de chaque page -->
        <div class="content">
            {% block content %}
            {% endblock %}
        </div>

        <!-- Footer commun -->
        <footer>
            <p>© 2025 Votre entreprise - Tous droits réservés</p>
        </footer>
    </div>

    <!-- Scripts JavaScript globaux -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ctx = document.getElementById('performanceChart').getContext('2d');

            // Données d'exemple pour le graphique
            const data = {
                labels: ['January', 'February', 'March', 'April', 'May'],
                datasets: [{
                    label: 'Performance',
                    data: [65, 59, 80, 81, 56],
                    borderColor: 'rgba(75, 192, 192, 1)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderWidth: 1
                }]
            };

            // Configuration du graphique
            const config = {
                type: 'line',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            enabled: true,
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function (context) {
                                    return `Performance: ${context.raw}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true
                        },
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            };

            // Rendu du graphique
            const performanceChart = new Chart(ctx, config);
        });
    </script>
<script src="static/js/dashboard_performance.js"></script>
</body>

</html>
