<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Title{% endblock %}</title>

    <!-- Bootstrap 5 CSS for modern UI components -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles for a modern UI -->
    <style>
        body {
            background-color: #f9f9f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            margin-top: 50px;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .alert {
            display: none;
            margin-top: 10px;
        }
    </style>

    <!-- Bootstrap 5 and Popper.js for UI components -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Modern JavaScript for form validation -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            const alertMessage = document.querySelector('#alert-message');

            form.addEventListener('submit', function(event) {
                const title = document.querySelector('#title').value;
                const body = document.querySelector('#body').value;

                if (!title || !body) {
                    event.preventDefault();
                    alertMessage.style.display = 'block';
                } else {
                    alertMessage.style.display = 'none';
                }
            });
        });
    </script>

</head>
<body>
    <div class="container">
        <div class="form-container">
            <h3 class="text-center mb-4">Create New Post</h3>

            <!-- Error message if the form is not properly filled -->
            <div id="alert-message" class="alert alert-danger" role="alert">
                All fields must be filled out
            </div>

            <!-- Form to submit title and body -->
            <form method="POST">
                <div class="mb-3">
                    <label for="title" class="form-label">Title</label>
                    <input type="text" class="form-control" id="title" name="title" placeholder="Enter the title" required>
                </div>
                <div class="mb-3">
                    <label for="body" class="form-label">Body</label>
                    <textarea class="form-control" id="body" name="body" rows="4" placeholder="Write the body content" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit</button>
            </form>
        </div>
        {% block content %}{% endblock %}
    </div>

    {{ script }}
</body>
</html>
