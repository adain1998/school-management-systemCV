{% extends "base.html" %}
{% block title %}Ajouter une Échéance{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="card shadow-sm rounded-4 border-0">
    <div class="card-header bg-primary text-white rounded-top-4">
      <h4 class="mb-0">Ajouter une Échéance pour le Paiement N°{{ payment.id }}</h4>
    </div>
    <div class="card-body">
      <form method="POST">
        <div class="mb-3">
          <label for="amount" class="form-label">Montant <span class="text-danger">*</span></label>
          <input type="number" step="0.01" class="form-control" id="amount" name="amount" required placeholder="Entrez le montant">
        </div>
        <div class="mb-3">
          <label for="due_date" class="form-label">Date d’échéance <span class="text-danger">*</span></label>
          <input type="date" class="form-control" id="due_date" name="due_date" required>
        </div>
        <div class="d-flex justify-content-between">
          <a href="{{ url_for('paiem.show_installments', payment_id=payment.id) }}" class="btn btn-secondary">Retour</a>
          <button type="submit" class="btn btn-success">Ajouter</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
