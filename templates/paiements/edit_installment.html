{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
  <h3 class="mb-4">Modifier l’échéance N° {{ installment.id }}</h3>

  <form method="POST" class="card p-4 shadow-sm border-0">
    <div class="mb-3">
      <label for="amount" class="form-label">Montant :</label>
      <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ installment.amount }}" required>
    </div>

    <div class="mb-3">
      <label for="due_date" class="form-label">Date d’échéance :</label>
      <input type="date" class="form-control" id="due_date" name="due_date" value="{{ installment.due_date }}" required>
    </div>

    <div class="d-flex justify-content-between">
      <button type="submit" class="btn btn-success">
        <i class="bi bi-save"></i> Mettre à jour
      </button>
      <a href="{{ url_for('paiem.show_installments', payment_id=installment.payment_id) }}" class="btn btn-secondary">
        <i class="bi bi-x-circle"></i> Annuler
      </a>
    </div>
  </form>
</div>
{% endblock %}
