{% extends "base.html" %}

{% block content %}
<h1 class="mt-5">Supprimer Étudiant</h1>
<p>Êtes-vous sûr de vouloir supprimer cet étudiant ? Cette action est irréversible.</p>
<form action="{{ url_for('delete_student', id=student.id) }}" method="post">
    <button type="submit" class="btn btn-danger">Supprimer</button>
    <a href="{{ url_for('students_list') }}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
