<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Page Non Trouvée - 404</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Arial', sans-serif;
        }
        .container {
            margin-top: 100px;
            text-align: center;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #dc3545;
        }
        .error-message {
            font-size: 24px;
            margin-top: 20px;
            color: #6c757d;
        }
        .error-description {
            font-size: 16px;
            margin-top: 15px;
            color: #868e96;
        }
        .btn-back {
            margin-top: 25px;
            font-size: 18px;
        }
        .footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #6c757d;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="error-code">404</div>
        <div class="error-message">Page Non Trouvée</div>
        <div class="error-description">
            Oups, il semble que cette page n'existe pas ou a été déplacée.<br>
            Vous pouvez retourner à la page d'accueil ou utiliser le menu pour explorer d'autres sections.
        </div>
        <a href="/" class="btn btn-primary btn-back">Retour à l'accueil</a>
    </div>

    <div class="footer">
        <p>&copy; {{ current_year }} Votre Application. Tous droits réservés.</p>
    </div>

    <script>
        // Affichage dynamique de l'année
        document.addEventListener('DOMContentLoaded', function () {
            const year = new Date().getFullYear();
            document.querySelector('.footer p').textContent = `© ${year} Votre Application. Tous droits réservés.`;
        });
    </script>

</body>

</html>
