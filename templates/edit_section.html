{% extends 'base.html' %}

{% block title %}Modifier une Section{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-primary text-white rounded-top-4 d-flex justify-content-between align-items-center">
            <h4 class="mb-0">
                <i class="fas fa-edit me-2"></i>Modifier la Section
            </h4>
            <a href="{{ url_for(blueprint_sect + '.view_sections') }}" class="btn btn-light btn-sm">
                <i class="fas fa-arrow-left"></i> Retour
            </a>
        </div>
        <div class="card-body">
            <form method="POST" novalidate>
                <div class="mb-3 position-relative">
                    <label for="name" class="form-label fw-bold">Nom de la section</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="name" name="name"
                               value="{{ section.nom or '' }}" required>
                        <span class="input-group-text">
                            <i class="fas fa-pen text-secondary"></i>
                        </span>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="classe_id" class="form-label fw-bold">Classe associée</label>
                    <div class="input-group">
                        <select class="form-select" id="classe_id" name="classe_id" required>
                            <option value="">-- Sélectionnez une classe --</option>
                            {% for classe in classes %}
                                <option value="{{ classe.id }}"
                                    {% if classe.id == section.classe_id %}selected{% endif %}>
                                    {{ classe.nom }}
                                </option>
                            {% endfor %}
                        </select>
                        <span class="input-group-text">
                            <i class="fas fa-list text-secondary"></i>
                        </span>
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="fas fa-save me-1"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
