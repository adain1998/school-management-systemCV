{% extends "base.html" %}

{% block title %}Erreur - Application{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="alert alert-danger" role="alert">
    <h4 class="alert-heading">Une erreur est survenue</h4>
    <p>Code d'erreur : {{ error.code }}</p>
    <hr>
    <p>{{ error.description or "Une erreur inattendue s'est produite. Veuillez réessayer plus tard." }}</p>
    <a href="{{ url_for('tableau.index') }}" class="btn btn-primary mt-3">Retour à l'accueil</a>
  </div>
</div>
{% endblock %}
